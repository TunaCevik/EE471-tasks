<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azure Speech Services</title>
    <meta name="description" content="Text-to-Speech and Speech-to-Text powered by Azure.">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>Azure Speech Services</h1>
            <p>Powered by Azure Cognitive Services</p>
        </header>
        <main id="app-content">
            <div id="tts-section" class="feature-section">
                <h2>Text-to-Speech</h2>
                <div class="form-group">
                    <label for="tts-input">Enter text to convert to speech:</label>
                    <textarea id="tts-input" rows="4" placeholder="Hello, class!"></textarea>
                </div>
                <div class="form-group">
                    <button id="btn-synthesize">🎤 Synthesize Speech</button>
                </div>
                
                <div id="tts-alert" class="alert"></div>
                
                <div id="tts-audio-container" class="audio-player-container" style="display: none;">
                    <label>Generated Audio:</label>
                    <audio id="tts-audio-player" controls></audio>
                </div>
            </div>
        </main>
    </div>
    <script>
        document.getElementById('btn-synthesize').addEventListener('click', async () => {
            const text = document.getElementById('tts-input').value;
            const alertBox = document.getElementById('tts-alert');
            const audioContainer = document.getElementById('tts-audio-container');
            const audioPlayer = document.getElementById('tts-audio-player');
            
            if (!text.trim()) {
                alertBox.textContent = 'Please enter some text.';
                alertBox.className = 'alert error';
                alertBox.style.display = 'block';
                return;
            }
            
            try {
                const response = await fetch('/api/tts', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({text: text})
                });
                
                if (response.ok) {
                    const blob = await response.blob();
                    const audioUrl = URL.createObjectURL(blob);
                    audioPlayer.src = audioUrl;
                    audioContainer.style.display = 'block';
                    
                    alertBox.textContent = '✓ Speech synthesized successfully!';
                    alertBox.className = 'alert success';
                    alertBox.style.display = 'block';
                } else {
                    const data = await response.json();
                    throw new Error(data.error || 'Server error');
                }
            } catch (error) {
                alertBox.textContent = 'Error: ' + error.message;
                alertBox.className = 'alert error';
                alertBox.style.display = 'block';
            }
        });
    </script>
</body>
</html>
